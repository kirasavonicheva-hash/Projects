<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Регистрация — Лунное сияние</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Montserrat', sans-serif;
        }
        body {
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: linear-gradient(145deg, #0b0719 0%, #1a1030 50%, #0c0922 100%);
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, rgba(255, 30, 150, 0.25) 0%, rgba(0, 0, 0, 0.4) 80%);
            pointer-events: none;
        }
        #cometsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.55;
            filter: blur(1px);
        }
        .register-card {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            background: rgba(20, 12, 35, 0.55);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border-radius: 3rem;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 70, 180, 0.4), inset 0 0 35px rgba(255, 30, 150, 0.3);
            border: 1px solid rgba(255, 90, 190, 0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #ff66c0, #f0a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(255, 30, 150, 0.4);
        }
        .logo p {
            color: #e0bbff;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            color: #ffd0f0;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .input-group input {
            width: 100%;
            background: rgba(255, 220, 250, 0.15);
            border: 1px solid #ff77cc;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #ff66c0;
            box-shadow: 0 0 20px #ff44aa;
            background: rgba(30, 10, 55, 0.8);
        }
        .input-group input::placeholder {
            color: #b88ad0;
        }
        .error-message {
            color: #ff98c0;
            font-size: 0.75rem;
            margin-top: 5px;
            padding-left: 12px;
        }
        .neon-btn {
            width: 100%;
            background: rgba(255, 60, 160, 0.3);
            border: 2px solid #ff6ac4;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffddf5;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
            box-shadow: 0 0 12px #ff44aa;
            margin-top: 10px;
        }
        .neon-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 28px #ff56bc;
            background: rgba(255, 80, 170, 0.45);
            color: white;
        }
        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #ccb0e6;
        }
        .login-link a {
            color: #ff9ad0;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .cat-small {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .cat-small svg {
            width: 70px;
            height: 70px;
            filter: drop-shadow(0 0 8px #ff66c0);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake-animation {
            animation: shake 0.3s ease-in-out 0s 2;
        }
        .contact-hint {
            font-size: 0.75rem;
            color: #b88ad0;
            margin-top: 5px;
            padding-left: 12px;
        }
    </style>
</head>
<body>
<canvas id="cometsCanvas"></canvas>
<div class="register-card">
    <div class="cat-small">
            </defs>
        </svg>
    </div>
    <div class="logo">
        <h1>🌙Лунное сияние</h1>
        <p>начни свой путь к лучшей версии себя</p>
    </div>
    <form id="registerForm">
        <div class="input-group">
            <label>Как вас зовут?</label>
            <input type="text" id="userName" placeholder="Например: Алиса" autocomplete="off">
            <div class="error-message" id="nameError"></div>
        </div>
        <div class="input-group">
            <label>Дата рождения</label>
            <input type="date" id="userBirthdate">
            <div class="error-message" id="birthdateError"></div>
        </div>
        <div class="input-group">
            <label>Email или номер телефона</label>
            <input type="text" id="userContact" placeholder="@email.com/+7 999 123-45-67" autocomplete="off">
            <div class="error-message" id="contactError"></div>
        </div>
        <div class="input-group">
            <label>Пароль</label>
            <input type="password" id="userPassword" placeholder="Придумайте пароль">
            <div class="error-message" id="passwordError"></div>
        </div>
        <div class="input-group">
            <label>Подтверждение пароля</label>
            <input type="password" id="userPasswordConfirm" placeholder="Повторите пароль">
            <div class="error-message" id="passwordConfirmError"></div>
        </div>
        <button type="submit" class="neon-btn">Зарегистрироваться</button>
    </form>
    <div class="login-link">
        Уже есть аккаунт? <a href="#" id="showLoginBtn">Войти</a>
    </div>
</div>
<script>
    const USERS_KEY = "lunar_habit_users";
    const CURRENT_USER_KEY = "lunar_current_user";
    function detectContactType(contact) {
        if (!contact) return null;
        const trimmed = contact.trim();
        const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        if (emailRegex.test(trimmed.toLowerCase())) {
            return 'email';
        }
        const hasDigits = /\d/.test(trimmed);
        if (hasDigits) {
            return 'phone';
        }
        return null;
    }
    function normalizePhone(phone) {
        if (!phone) return "";
        let cleaned = phone.trim().replace(/[^\d+]/g, '');
        if (cleaned.startsWith('+')) {
            return cleaned;
        } else {
            return cleaned.replace(/\D/g, '');
        }
    }
    function isValidPhone(phone) {
        if (!phone) return false;
        const normalized = normalizePhone(phone);
        const phoneRegex = /^\+?[0-9]{5,15}$/;
        return phoneRegex.test(normalized);
    }
    function isValidEmail(email) {
        if (!email) return false;
        const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
        return re.test(String(email).toLowerCase());
    }
    function getUsers() {
        const raw = localStorage.getItem(USERS_KEY);
        if (!raw) return [];
        try {
            return JSON.parse(raw);
        } catch(e) {
            return [];
        }
    }
    function saveUsers(users) {
        localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }
    function isContactUnique(contact, type, excludeUserId = null) {
        const users = getUsers();
        if (type === 'email') {
            const normalizedEmail = contact.toLowerCase().trim();
            return !users.some(u => u.email && u.email.toLowerCase() === normalizedEmail && u.id !== excludeUserId);
        } else if (type === 'phone') {
            const normalizedPhone = normalizePhone(contact);
            return !users.some(u => u.phone && normalizePhone(u.phone) === normalizedPhone && u.id !== excludeUserId);
        }
        return false;
    }
    function isValidBirthdate(dateStr) {
        if (!dateStr) return false;
        const birthdate = new Date(dateStr);
        const today = new Date();
        let age = today.getFullYear() - birthdate.getFullYear();
        const monthDiff = today.getMonth() - birthdate.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthdate.getDate())) {
            age--;
        }
        return age >= 6 && age <= 120 && !isNaN(birthdate.getTime());
    }
    function isValidName(name) {
        return name && name.trim().length >= 2 && name.trim().length <= 50;
    }
    function isValidPassword(password) {
        return password && password.trim().length >= 4;
    }
    function showFieldError(fieldId, message) {
        const errorDiv = document.getElementById(fieldId);
        if (errorDiv) {
            errorDiv.textContent = message;
            const input = errorDiv.previousElementSibling;
            if (input && input.tagName === 'INPUT') {
                input.classList.add('shake-animation');
                setTimeout(() => input.classList.remove('shake-animation'), 600);
            }
        }
    }
    function clearFieldError(fieldId) {
        const errorDiv = document.getElementById(fieldId);
        if (errorDiv) errorDiv.textContent = "";
    }
    function registerUser(name, birthdate, contact, contactType, password) {
        const users = getUsers();
        const newUser = {
            id: crypto.randomUUID ? crypto.randomUUID() : Date.now() + "_" + Math.random(),
            name: name.trim(),
            birthdate: birthdate,
            email: contactType === 'email' ? contact.toLowerCase().trim() : "",
            phone: contactType === 'phone' ? normalizePhone(contact) : "",
            password: password.trim(),
            createdAt: new Date().toISOString()
        };
        users.push(newUser);
        saveUsers(users);
        return newUser;
    }
    function loginUser(identifier, password) {
        const users = getUsers();
        const contactType = detectContactType(identifier);
        if (!contactType) return null;
        const normalizedIdentifier = identifier.trim();
        const user = users.find(u => {
            if (contactType === 'email') {
                return u.email && u.email.toLowerCase() === normalizedIdentifier.toLowerCase() && u.password === password;
            } else if (contactType === 'phone') {
                const normalizedInputPhone = normalizePhone(normalizedIdentifier);
                return u.phone && normalizePhone(u.phone) === normalizedInputPhone && u.password === password;
            }
            return false;
        });
        
        if (user) {
            localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
            return user;
        }
        return null;
    }
    function getCurrentUser() {
        const raw = localStorage.getItem(CURRENT_USER_KEY);
        if (!raw) return null;
        try {
            return JSON.parse(raw);
        } catch(e) {
            return null;
        }
    }
    function redirectToTracker() {
        window.location.href = "index.html";
    }
    function checkAutoLogin() {
        const currentUser = getCurrentUser();
        if (currentUser) {
            redirectToTracker();
        }
    }
    function showLoginModal() {
        const existingModal = document.querySelector('.login-modal');
        if (existingModal) existingModal.remove();
        const modal = document.createElement('div');
        modal.className = 'login-modal';
        modal.style.cssText = `
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        `;
        modal.innerHTML = `
            <div style="background: #2a1f3e; border-radius: 2rem; padding: 2rem; max-width: 400px; width: 90%; border: 1px solid #ff77cc; box-shadow: 0 0 40px rgba(255,68,170,0.3);">
                <h3 style="color: #ffd9f0; text-align: center; margin-bottom: 1rem;">Вход в сияние</h3>
                <div class="input-group" style="margin-bottom: 1.2rem;">
                    <label style="color: #ffd0f0;">Email или номер телефона</label>
                    <input type="text" id="loginIdentifier" placeholder="@email.com/+7 999 123-45-67" style="width:100%; background:rgba(255,220,250,0.15); border:1px solid #ff77cc; padding:12px 18px; border-radius:60px; color:white;">
                    <div class="error-message" id="loginIdentifierError" style="color:#ff98c0;"></div>
                </div>
                <div class="input-group" style="margin-bottom: 1.2rem;">
                    <label style="color: #ffd0f0;">Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Ваш пароль" style="width:100%; background:rgba(255,220,250,0.15); border:1px solid #ff77cc; padding:12px 18px; border-radius:60px; color:white;">
                    <div class="error-message" id="loginPasswordError" style="color:#ff98c0;"></div>
                </div>
                <button id="doLoginBtn" class="neon-btn" style="width:100%; margin-top:0;">Войти</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="#" id="closeLoginModal" style="color:#ff9ad0;">Закрыть</a>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        const loginBtn = modal.querySelector('#doLoginBtn');
        const identifierInput = modal.querySelector('#loginIdentifier');
        const passwordInput = modal.querySelector('#loginPassword');
        const identifierError = modal.querySelector('#loginIdentifierError');
        const passwordError = modal.querySelector('#loginPasswordError');
        function attemptLogin() {
            const identifier = identifierInput.value.trim();
            const password = passwordInput.value.trim();
            let valid = true;
            if (!identifier) {
                identifierError.textContent = "Введите email или номер телефона";
                identifierInput.classList.add('shake-animation');
                setTimeout(() => identifierInput.classList.remove('shake-animation'), 600);
                valid = false;
            } else {
                identifierError.textContent = "";
            }
            if (!password) {
                passwordError.textContent = "Введите пароль";
                passwordInput.classList.add('shake-animation');
                setTimeout(() => passwordInput.classList.remove('shake-animation'), 600);
                valid = false;
            } else {
                passwordError.textContent = "";
            }
            if (!valid) return;
            const user = loginUser(identifier, password);
            if (user) {
                modal.remove();
                redirectToTracker();
            } else {
                identifierError.textContent = "Неверный email/телефон или пароль";
                identifierInput.classList.add('shake-animation');
                setTimeout(() => identifierInput.classList.remove('shake-animation'), 600);
                passwordInput.classList.add('shake-animation');
                setTimeout(() => passwordInput.classList.remove('shake-animation'), 600);
            }
        }
        loginBtn.addEventListener('click', attemptLogin);
        [identifierInput, passwordInput].forEach(inp => {
            inp.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') attemptLogin();
            });
        });
        modal.querySelector('#closeLoginModal').addEventListener('click', (e) => {
            e.preventDefault();
            modal.remove();
        });
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
        
        identifierInput.focus();
    }
    function setupRegistrationForm() {
        const form = document.getElementById('registerForm');
        const nameInput = document.getElementById('userName');
        const birthdateInput = document.getElementById('userBirthdate');
        const contactInput = document.getElementById('userContact');
        const passwordInput = document.getElementById('userPassword');
        const passwordConfirmInput = document.getElementById('userPasswordConfirm');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            let isValid = true;
            const name = nameInput.value;
            const birthdate = birthdateInput.value;
            const contact = contactInput.value.trim();
            const password = passwordInput.value;
            const passwordConfirm = passwordConfirmInput.value;
            if (!isValidName(name)) {
                showFieldError('nameError', 'Имя должно быть от 2 до 50 символов');
                isValid = false;
            } else {
                clearFieldError('nameError');
            }
            if (!isValidBirthdate(birthdate)) {
                showFieldError('birthdateError', 'Введите корректную дату (возраст от 6 до 120 лет)');
                isValid = false;
            } else {
                clearFieldError('birthdateError');
            }
            let contactType = detectContactType(contact);
            let contactValid = true;
            if (!contact) {
                showFieldError('contactError', 'Введите email или номер телефона');
                isValid = false;
                contactValid = false;
            } else if (!contactType) {
                showFieldError('contactError', 'Введите корректный email или номер телефона');
                isValid = false;
                contactValid = false;
            } else if (contactType === 'email' && !isValidEmail(contact)) {
                showFieldError('contactError', 'Введите корректный email адрес');
                isValid = false;
                contactValid = false;
            } else if (contactType === 'phone' && !isValidPhone(contact)) {
                showFieldError('contactError', 'Введите корректный номер телефона');
                isValid = false;
                contactValid = false;
            } else {
                clearFieldError('contactError');
            }
            if (contactValid && contactType) {
                if (!isContactUnique(contact, contactType)) {
                    showFieldError('contactError', contactType === 'email' ? 
                        'Этот email уже зарегистрирован. Войдите или используйте другой.' : 
                        'Этот номер телефона уже зарегистрирован. Войдите или используйте другой.');
                    isValid = false;
                } else {
                    clearFieldError('contactError');
                }
            }
            if (!isValidPassword(password)) {
                showFieldError('passwordError', 'Пароль должен содержать минимум 4 символа');
                isValid = false;
            } else {
                clearFieldError('passwordError');
            }
            if (password !== passwordConfirm) {
                showFieldError('passwordConfirmError', 'Пароли не совпадают');
                isValid = false;
            } else {
                clearFieldError('passwordConfirmError');
            }
            if (isValid && contactType) {
                const newUser = registerUser(name, birthdate, contact, contactType, password);
                localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(newUser));
                redirectToTracker();
            }
        });
    }
    checkAutoLogin();
    setupRegistrationForm();
    const showLoginBtn = document.getElementById('showLoginBtn');
    if (showLoginBtn) {
        showLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            showLoginModal();
        });
    }
    const canvas = document.getElementById('cometsCanvas');
    let ctx = canvas.getContext('2d');
    let comets = [];
    let animationFrameId = null;
    let isPageActive = true;
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class SoftComet {
        constructor() { this.reset(); }
        reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * -500 - 100; this.size = Math.random() * 1.8 + 0.8; this.speedY = Math.random() * 0.95 + 0.4; this.speedX = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.45 + 0.2; this.hue = 310 + Math.random() * 40; }
        update() { this.y += this.speedY; this.x += this.speedX; if(this.y > canvas.height + 200) this.reset(); }
        draw() { 
            if (!ctx) return;
            const tailX = this.x - this.speedX * 50, tailY = this.y - this.speedY * 50;
            const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
            grad.addColorStop(0, `hsla(${this.hue}, 75%, 68%, ${this.opacity * 0.8})`);
            grad.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0)`);
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(tailX, tailY);
            ctx.strokeStyle = grad;
            ctx.lineWidth = this.size * 0.6;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI*2);
            ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${this.opacity})`;
            ctx.fill();
        }
    }
    function initComets() { comets = Array.from({ length: 18 }, () => new SoftComet()); }
    function animateComets() { 
        if(!isPageActive || !ctx) { animationFrameId = requestAnimationFrame(animateComets); return; } 
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.globalCompositeOperation = 'lighter';
        comets.forEach(c=>{c.update(); c.draw();});
        ctx.globalCompositeOperation = 'source-over';
        animationFrameId = requestAnimationFrame(animateComets); 
    }
    function handleVisibilityChange() { isPageActive = !document.hidden; }
    document.addEventListener('visibilitychange', handleVisibilityChange);
    window.addEventListener('resize', () => { resizeCanvas(); initComets(); });
    resizeCanvas(); initComets(); animateComets();
</script>
</body>
</html>
