<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Лунное сияние — Трекер привычек</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Montserrat', sans-serif;
        }
        body {
            min-height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.5rem;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: linear-gradient(145deg, #0b0719 0%, #1a1030 50%, #0c0922 100%);
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 30% 40%, rgba(255, 30, 150, 0.25) 0%, rgba(0, 0, 0, 0.4) 80%);
            pointer-events: none;
            box-shadow: inset 0 0 100px rgba(255, 0, 120, 0.3);
        }
        #cometsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            opacity: 0.55;
            filter: blur(1px);
            will-change: transform;
        }
        .drawer-panel {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 300px;
            background: rgba(18, 8, 35, 0.94);
            backdrop-filter: blur(24px) saturate(180%);
            border-right: 2px solid rgba(255, 70, 180, 0.7);
            box-shadow: 8px 0 40px rgba(0, 0, 0, 0.6), -2px 0 15px rgba(255, 30, 150, 0.3);
            transform: translateX(-95%);
            transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 1.5rem 1rem;
            border-radius: 0 2rem 2rem 0;
        }
        .drawer-panel:hover {
            transform: translateX(0);
        }
        .drawer-panel::before {
            content: "☾";
            position: absolute;
            right: -32px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 60, 160, 0.7);
            backdrop-filter: blur(8px);
            padding: 12px 6px;
            border-radius: 0 30px 30px 0;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffcef0;
            border: 1px solid #ff88cc;
            border-left: none;
            box-shadow: 3px 0 12px rgba(255, 0, 150, 0.4);
            pointer-events: none;
        }
        .drawer-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 120, 200, 0.5);
            padding-bottom: 1.4rem;
        }
        .avatar-wrapper {
            position: relative;
            margin-bottom: 12px;
            cursor: pointer;
        }
        .avatar-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #ff66c0, #c084fc);
            padding: 3px;
            box-shadow: 0 0 20px rgba(255, 70, 180, 0.6);
            transition: transform 0.2s;
        }
        .avatar-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background: #1a1030;
        }
        .avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff66c0, #c084fc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 5px #ff44aa;
        }
        .change-avatar-hint {
            font-size: 0.65rem;
            color: #d9a7ff;
            margin-top: 4px;
            text-align: center;
        }
        .drawer-user-name {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #f0a6ff, #ff66c0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .drawer-user-email {
            font-size: 0.75rem;
            color: #e0bbff;
            margin-top: 4px;
            opacity: 0.8;
        }
        .drawer-menu {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 1rem;
        }
        .drawer-btn {
            background: rgba(255, 60, 160, 0.2);
            border: 1px solid #ff77cc;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffe6f5;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(4px);
            width: 100%;
            text-align: left;
        }
        .drawer-btn:hover {
            background: rgba(255, 80, 170, 0.6);
            transform: translateX(5px);
            border-color: #ffa0da;
            box-shadow: 0 0 12px #ff44aa;
        }
        .danger-btn {
            border-color: #ff5688;
            color: #ffbbdd;
        }
        .danger-btn:hover {
            background: rgba(255, 50, 100, 0.7);
            border-color: #ff8cb0;
        }
        .drawer-footer {
            margin-top: auto;
            font-size: 0.7rem;
            text-align: center;
            color: #b280c0;
            padding-top: 20px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10001;
        }
        .modal-window {
            background: #261b3f;
            border-radius: 2rem;
            padding: 2rem;
            width: 90%;
            max-width: 420px;
            border: 1px solid #ff77cc;
            box-shadow: 0 0 40px rgba(255, 0, 150, 0.4);
        }
        .modal-window h3 {
            color: #ffc0ea;
            margin-bottom: 1.5rem;
            text-align: center;
            font-size: 1.4rem;
        }
        .modal-input {
            width: 100%;
            background: rgba(255, 220, 250, 0.15);
            border: 1px solid #ff77cc;
            padding: 12px 16px;
            border-radius: 60px;
            color: white;
            margin-bottom: 1rem;
            outline: none;
        }
        .modal-input:focus {
            border-color: #ff66c0;
            box-shadow: 0 0 12px #ff44aa;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }
        .modal-btn {
            padding: 10px 24px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .modal-btn.save {
            background: #ff66c0;
            color: white;
        }
        .modal-btn.cancel {
            background: #3a2a55;
            color: #ffc0ea;
            border: 1px solid #ff88cc;
        }
        .avatar-option {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 1rem 0;
        }
        .avatar-action-btn {
            background: rgba(255, 100, 200, 0.3);
            border: 1px solid #ff77cc;
            padding: 12px;
            border-radius: 60px;
            color: #ffd9f0;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .avatar-action-btn:hover {
            background: rgba(255, 80, 170, 0.6);
            transform: scale(1.02);
        }
        .avatar-preview-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 10px auto;
            display: block;
            border: 2px solid #ff77cc;
        }
        .wrapper {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            background: rgba(20, 12, 35, 0.45);
            backdrop-filter: blur(24px) saturate(200%);
            border-radius: 3rem;
            padding: 2rem 2.5rem 3.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 70, 180, 0.4), inset 0 0 35px rgba(255, 30, 150, 0.3);
            border: 1px solid rgba(255, 90, 190, 0.5);
        }
        .header-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 1rem;
            background: rgba(45, 25, 70, 0.5);
            padding: 0.8rem 2rem;
            border-radius: 80px;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 100, 200, 0.45);
        }
        .title-area h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #ff66c0, #f0a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: flex;
            flex-direction: column;
        }
        .title-area h1 span {
            font-size: 1rem;
            background: linear-gradient(135deg, #c084fc, #ff66c0, #f0a6ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 600;
            margin-top: 3px;
            padding-left: 50px;
        }
        .user-info {
            display: none; 
        }
        .cat-streak-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .custom-cat {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cat-svg {
            width: 100px;
            height: 100px;
            display: block;
            margin: 0 auto;
            transition: transform 0.3s ease, filter 0.2s;
        }
        .cat-svg.active-cat {
            filter: drop-shadow(0 0 16px #ff66d0) !important;
            animation: catGlowPulse 1.2s infinite ease-in-out;
        }
        .cat-svg.inactive-cat {
            filter: grayscale(0.6) drop-shadow(0 0 4px #b370a0) !important;
            opacity: 0.7;
        }
        .cat-svg.cat-celebrate {
            animation: catCelebrateFlash 0.7s cubic-bezier(0.2, 1.2, 0.8, 1) 2, catShineFlash 0.7s ease-out 2 !important;
        }
        @keyframes catCelebrateFlash {
            0% { transform: scale(1); filter: drop-shadow(0 0 4px #ff66c0); }
            40% { transform: scale(1.25); filter: drop-shadow(0 0 45px #ff44dd) drop-shadow(0 0 25px #ffb0ff); }
            100% { transform: scale(1); filter: drop-shadow(0 0 16px #ff66d0); }
        }
        @keyframes catShineFlash {
            0% { filter: drop-shadow(0 0 4px #ff66c0) brightness(1); }
            30% { filter: drop-shadow(0 0 50px #ff88ff) drop-shadow(0 0 30px gold) brightness(1.8); }
            70% { filter: drop-shadow(0 0 35px #ff88ff) drop-shadow(0 0 20px gold) brightness(1.5); }
            100% { filter: drop-shadow(0 0 16px #ff66d0) brightness(1); }
        }
        @keyframes catGlowPulse {
            0% { filter: drop-shadow(0 0 6px #ff66c0); transform: scale(1); }
            50% { filter: drop-shadow(0 0 22px #ff44aa); transform: scale(1.04); }
            100% { filter: drop-shadow(0 0 6px #ff66c0); transform: scale(1); }
        }
        .global-streak {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffeef8;
            text-shadow: 0 0 6px #ff66c0;
            text-align: center;
            margin-top: 4px;
            position: relative;
            left: -6px;
        }
        .sub {
            text-align: center;
            color: #f0d6ff;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .add-habit {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 2rem;
            background: rgba(20, 8, 40, 0.55);
            padding: 1.3rem 1.8rem;
            border-radius: 3rem;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 70, 180, 0.5);
            align-items: center;
        }
        .add-habit input {
            flex: 2;
            min-width: 200px;
            background: rgba(255, 220, 250, 0.2);
            border: 1px solid #ff77cc;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            color: #ffffff;
            outline: none;
        }
        .type-selector {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 60px;
        }
        .type-option {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            padding: 6px 16px;
            border-radius: 40px;
            background: rgba(255,255,255,0.05);
        }
        .type-option input { display: none; }
        .type-option span {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffd0f0;
        }
        .type-option.active-bad { background: rgba(255, 70, 120, 0.7); box-shadow: 0 0 12px #ff4070; }
        .type-option.active-good { background: rgba(90, 210, 140, 0.7); box-shadow: 0 0 12px #6effb0; }
        .neon-btn {
            background: rgba(255, 60, 160, 0.25);
            border: 2px solid #ff6ac4;
            padding: 12px 32px;
            border-radius: 60px;
            font-weight: bold;
            color: #ffddf5;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.3s;
        }
        .neon-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 28px #ff56bc;
        }
        .habits-section {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .habit-column {
            background: rgba(25, 12, 48, 0.55);
            border-radius: 2rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 70, 180, 0.5);
            backdrop-filter: blur(20px);
        }
        .column-title {
            font-size: 1.25rem;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
        }
        .bad-title { color: #ff9ee0; }
        .good-title { color: #a0ffd0; }
        .habits-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 12px;
        }
        .habit-card {
            background: rgba(45, 25, 75, 0.6);
            border-radius: 2.2rem;
            padding: 1rem 1.3rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border: 1px solid rgba(255, 120, 200, 0.5);
        }
        .habit-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: #f3d9ff;
            flex: 2;
        }
        .habit-info {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            flex: 3;
        }
        .streak-badge {
            background: rgba(255, 80, 160, 0.35);
            border-radius: 40px;
            padding: 4px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffebf5;
        }
        .last-updated {
            font-size: 0.7rem;
            color: #e0bbff;
            background: rgba(100, 40, 130, 0.5);
            padding: 4px 12px;
            border-radius: 60px;
        }
        .actions {
            display: flex;
            gap: 12px;
        }
        .edit-btn, .check-btn, .delete-btn {
            background: rgba(230, 150, 200, 0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: #ffc0ea;
            border: 1px solid rgba(255, 100, 160, 0.6);
        }
        .check-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2.5rem;
            padding: 0.9rem 2rem;
            flex-wrap: wrap;
            gap: 18px;
            color: #f0ccff;
            border: 1px solid rgba(255, 110, 190, 0.7);
        }
        .stats span {
            font-weight: 800;
            color: #ffb3e0;
        }
        @media (max-width: 900px) {
            .habits-section { grid-template-columns: 1fr; }
            .wrapper { padding: 1.5rem; }
            .cat-streak-panel { margin-left: 0; }
            .drawer-panel { width: 260px; transform: translateX(-92%); }
        }
        .error-shake {
            animation: shakeNeon 0.3s ease-in-out 0s 2;
        }
        @keyframes shakeNeon {
            0% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            100% { transform: translateX(0); }
        }
        .empty-message { color: #ccb0e6; text-align: center; padding: 1rem; font-style: italic; }
    </style>
</head>
<body>
<canvas id="cometsCanvas"></canvas>
<div class="drawer-panel" id="accountDrawer">
    <div class="drawer-header">
        <div class="avatar-wrapper" id="avatarClickArea">
            <div class="avatar-icon" id="avatarContainer">
            </div>
        </div>
        <div class="change-avatar-hint">нажми на аватар, чтобы сменить</div>
        <div class="drawer-user-name" id="drawerUserName">Загрузка...</div>
        <div class="drawer-user-email" id="drawerUserEmail">lunar@space</div>
    </div>
    <div class="drawer-menu">
        <button class="drawer-btn" id="drawerChangeDataBtn">Изменить данные</button>
        <button class="drawer-btn danger-btn" id="drawerDeleteAccountBtn">Удалить аккаунт</button>
        <button class="drawer-btn" id="drawerLogoutBtn">Выйти</button>
    </div>
    <div class="drawer-footer">Лунное сияние<br>трекер привычек</div>
</div>
<div class="wrapper">
    <div class="header-stats">
        <div class="title-area"><h1>🌙Лунное сияние<span>трекер привычек</span></h1></div>
        <div class="user-info" style="display:none;"></div>
        <div class="cat-streak-panel">
            <div class="custom-cat">
                <svg class="cat-svg" id="catSvgElem" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="50" cy="98" rx="28" ry="18" fill="#FFE5F4" stroke="#FF66B5" stroke-width="2.5"/>
                    <circle cx="50" cy="70" r="32" fill="#FFE5F4" stroke="#FF66B5" stroke-width="2.5"/>
                    <path d="M22 47 L18 20 L46 40 Z" fill="#FFC8E4" stroke="#FF66B5" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M76 50 L82 20 L54 38 Z" fill="#FFC8E4" stroke="#FF66B5" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M27 40 L22 25 L44 36 Z" fill="#FF9ECF" stroke="none"/>
                    <path d="M73 40 L78 25 L56 36 Z" fill="#FF9ECF" stroke="none"/>
                    <ellipse cx="41" cy="57" rx="6.5" ry="7.5" fill="#2D1B46"/>
                    <ellipse cx="59" cy="57" rx="6.5" ry="7.5" fill="#2D1B46"/>
                    <circle cx="43" cy="54" r="2.5" fill="white"/>
                    <circle cx="61" cy="54" r="2.5" fill="white"/>
                    <path d="M41 53 L42.5 56.5 L41 60 L39.5 56.5 Z" fill="#C58AFF" opacity="0.95"/>
                    <path d="M59 53 L60.5 56.5 L59 60 L57.5 56.5 Z" fill="#C58AFF" opacity="0.95"/>
                    <ellipse cx="50" cy="66" rx="5" ry="3.8" fill="#FF7AAA"/>
                    <path d="M44 71 L50 67 L56 71" stroke="#FF5A95" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <path d="M50 70 L50 73" stroke="#FF5A95" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="64" x2="18" y2="60" stroke="#E0A0C0" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="68" x2="16" y2="68" stroke="#E0A0C0" stroke-width="2" stroke-linecap="round"/>
                    <line x1="35" y1="72" x2="18" y2="76" stroke="#E0A0C0" stroke-width="2" stroke-linecap="round"/>
                    <line x1="65" y1="64" x2="82" y2="60" stroke="#E0A0C0" stroke-width="2" stroke-linecap="round"/>
                    <line x1="65" y1="68" x2="84" y2="68" stroke="#E0A0C0" stroke-width="2" stroke-linecap="round"/>
                    <line x1="65" y1="72" x2="82" y2="76" stroke="#E0A0C0" stroke-width="2" stroke-linecap="round"/>
                    <path d="M44 44 L56 44 L50 52 Z" fill="#FFEAA0" stroke="#FFBB66" stroke-width="1.5"/>
                    <circle cx="50" cy="39" r="8" fill="#FFE884" stroke="#FFAA66" stroke-width="1.2"/>
                    <circle cx="37" cy="66" r="4.5" fill="#FFB0D0" opacity="0.7"/>
                    <circle cx="63" cy="66" r="4.5" fill="#FFB0D0" opacity="0.7"/>
                    <path d="M72 28 L74 32 L78 32 L75 35 L76 39 L72 37 L68 39 L69 35 L66 32 L70 32 Z" fill="#FFEEB0" opacity="0.9"/>
                    <path d="M28 28 L30 32 L34 32 L31 35 L32 39 L28 37 L24 39 L25 35 L22 32 L26 32 Z" fill="#FFEEB0" opacity="0.85"/>
                    <ellipse cx="36" cy="102" rx="10" ry="6" fill="#FFD6EA" stroke="#FF66B5" stroke-width="1.5"/>
                    <ellipse cx="64" cy="102" rx="10" ry="6" fill="#FFD6EA" stroke="#FF66B5" stroke-width="1.5"/>
                    <path d="M78 95 Q92 88 88 76 Q86 68 80 72" stroke="#FFC8E4" stroke-width="4" fill="none" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="global-streak" id="globalStreakDisplay">0</div>
        </div>
    </div>
    <div class="sub">Выберите тип привычки и добавьте название</div>
    <div class="add-habit">
        <input type="text" id="habitNameInput" placeholder="Ваша привычка: йога, кофе, соцсети, бег...">
        <div class="type-selector" id="typeSelector">
            <label class="type-option" id="badOption"><input type="radio" name="habitType" value="bad" checked> <span>Вредная(отказ)</span></label>
            <label class="type-option" id="goodOption"><input type="radio" name="habitType" value="good"> <span>Полезная(выполнение)</span></label>
        </div>
        <button class="neon-btn" id="addHabitBtn">Добавить</button>
    </div>
    <div id="habitsContainer" class="habits-section">
        <div class="habit-column"><div class="column-title bad-title">Вредные привычки</div><div class="habits-grid" id="badHabits"></div></div>
        <div class="habit-column"><div class="column-title good-title">Полезные привычки</div><div class="habits-grid" id="goodHabits"></div></div>
    </div>
    <div class="stats"><p>Всего: <span id="totalHabits">0</span></p><p>Макс. цепочка: <span id="maxStreak">0</span></p><p>Выполнено сегодня: <span id="todayCompleted">0</span></p></div>
</div>
<script>
    function getCurrentUser() { return JSON.parse(localStorage.getItem('lunar_current_user') || '{}'); }
    function saveCurrentUser(user) { localStorage.setItem('lunar_current_user', JSON.stringify(user)); }
    function getStorageKey() { const user = getCurrentUser(); return `lunar_habit_${user.id || 'guest'}`; }
    let habits = [];
    function saveToDB() { localStorage.setItem(getStorageKey(), JSON.stringify(habits)); }
    function validateEmail(email) { return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email); }
    function validatePassword(pwd) { return pwd && pwd.length >= 10; }
    function updateUserInterface() {
        const user = getCurrentUser();
        document.getElementById('drawerUserName').textContent = user.name || 'Гость Луны';
        document.getElementById('drawerUserEmail').textContent = user.email || 'luna@lunar.com';
        const avatarUrl = user.avatar || null;
        const container = document.getElementById('avatarContainer');
        if (avatarUrl && (avatarUrl.startsWith('data:') || avatarUrl.startsWith('http'))) {
            container.innerHTML = `<img src="${avatarUrl}" alt="avatar" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        } else {
            const letter = (user.name && user.name[0]) ? user.name[0].toUpperCase() : '🌙';
            container.innerHTML = `<div class="avatar-placeholder">${letter}</div>`;
        }
    }
    function showConfirmModal(title, message, onConfirm) {
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-window"><h3>${title}</h3><p style="color:#ffd0f0; margin-bottom:1.5rem;">${message}</p><div class="modal-buttons"><button class="modal-btn save" id="confirmYes">Да</button><button class="modal-btn cancel" id="confirmNo">Нет</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#confirmYes').onclick = () => { onConfirm(); modal.remove(); };
        modal.querySelector('#confirmNo').onclick = () => modal.remove();
    }
    function showEditDataModal() {
        const user = getCurrentUser();
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-window"><h3>Редактирование данных</h3><input type="text" id="editName" class="modal-input" placeholder="Имя" value="${escapeHtml(user.name || '')}"><input type="email" id="editEmail" class="modal-input" placeholder="Email" value="${escapeHtml(user.email || '')}"><input type="password" id="editPassword" class="modal-input" placeholder="Новый пароль (мин. 10 символов)"><div class="modal-buttons"><button class="modal-btn save" id="saveDataBtn">Сохранить</button><button class="modal-btn cancel" id="cancelDataBtn">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        modal.querySelector('#saveDataBtn').onclick = () => {
            const newName = modal.querySelector('#editName').value.trim();
            const newEmail = modal.querySelector('#editEmail').value.trim();
            const newPassword = modal.querySelector('#editPassword').value;
            if (newName) user.name = newName;
            if (newEmail) {
                if (!validateEmail(newEmail)) { showToast("Некорректный email", "#ff99cc"); return; }
                user.email = newEmail;
            }
            if (newPassword) {
                if (!validatePassword(newPassword)) { showToast("Пароль должен быть не менее 10 символов", "#ff99cc"); return; }
                user.password = newPassword;
            }
            saveCurrentUser(user);
            updateUserInterface();
            showToast("Данные обновлены", "#b3ffcc");
            modal.remove();
        };
        modal.querySelector('#cancelDataBtn').onclick = () => modal.remove();
    }
    let tempAvatarData = null;
    function showAvatarPicker() {
        tempAvatarData = null;
        const modal = document.createElement('div'); modal.className = 'modal-overlay';
        modal.innerHTML = `<div class="modal-window"><h3>Сменить аватар</h3><div id="avatarPreviewArea" style="text-align:center;"></div><div class="avatar-option"><button class="avatar-action-btn" id="selectFromGalleryBtn">Выбрать из галереи</button><button class="avatar-action-btn" id="clearAvatarBtn">Удалить аватар</button></div><div class="modal-buttons"><button class="modal-btn save" id="saveAvatarBtn">Сохранить</button><button class="modal-btn cancel" id="cancelAvatarBtn">Отмена</button></div></div>`;
        document.body.appendChild(modal);
        const previewArea = modal.querySelector('#avatarPreviewArea');
        function updatePreview() {
            if (tempAvatarData) previewArea.innerHTML = `<img src="${tempAvatarData}" class="avatar-preview-img" alt="preview">`;
            else previewArea.innerHTML = `<div class="avatar-placeholder" style="width:100px;height:100px;margin:10px auto;font-size:2rem;"></div>`;
        }
        updatePreview();
        modal.querySelector('#selectFromGalleryBtn').onclick = () => {
            const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onload = (ev) => { tempAvatarData = ev.target.result; updatePreview(); }; reader.readAsDataURL(file); }
            }; input.click();
        };
        modal.querySelector('#clearAvatarBtn').onclick = () => { tempAvatarData = null; updatePreview(); };
        modal.querySelector('#saveAvatarBtn').onclick = () => {
            const user = getCurrentUser();
            if (tempAvatarData) user.avatar = tempAvatarData;
            else if (tempAvatarData === null && user.avatar) delete user.avatar;
            saveCurrentUser(user); updateUserInterface(); showToast("Аватар обновлен", "#dbbaff"); modal.remove();
        };
        modal.querySelector('#cancelAvatarBtn').onclick = () => modal.remove();
    }
    function deleteAccount() { showConfirmModal("Удаление аккаунта", "Все привычки и прогресс будут утеряны.", () => { const user = getCurrentUser(); if(user.id) localStorage.removeItem(`lunar_habit_${user.id}`); localStorage.removeItem('lunar_current_user'); window.location.href = 'add.html'; }); }
    function logout() { showConfirmModal("Выход", "Вы уверены, что хотите выйти?", () => { localStorage.removeItem('lunar_current_user'); window.location.href = 'add.html'; }); }
    function getTodayDate() { return new Date().toISOString().slice(0,10); }
    function getYesterdayStr() { const y = new Date(); y.setDate(y.getDate() - 1); return y.toISOString().slice(0,10); }
    function computeGlobalStreak() {
        if (habits.length === 0) return 0;
        let allDates = []; for (let h of habits) if (h.lastCheckDate) allDates.push(h.lastCheckDate);
        if (allDates.length === 0) return 0;
        let uniqueDates = [...new Set(allDates)].sort().reverse();
        const today = getTodayDate(), yesterday = getYesterdayStr();
        const hasToday = uniqueDates.includes(today), hasYesterday = uniqueDates.includes(yesterday);
        if (!hasToday && !hasYesterday) return 0;
        let startDate = hasToday ? today : yesterday;
        let streak = 1;
        let checkDate = new Date(startDate);
        for (let i = 1; i < 365; i++) { checkDate.setDate(checkDate.getDate() - 1); const dateStr = checkDate.toISOString().slice(0,10); if (uniqueDates.includes(dateStr)) streak++; else break; }
        return streak;
    }
    function recalcStreakFromHistory(habit) {
        if (!habit.history || habit.history.length === 0) return 0;
        let streak = 0, currentDate = new Date(); currentDate.setHours(0,0,0,0);
        for (let i = 0; i < 365; i++) { const dateStr = currentDate.toISOString().slice(0,10); if (habit.history.includes(dateStr)) { streak++; currentDate.setDate(currentDate.getDate() - 1); } else break; }
        return streak;
    }
    function refreshAllStreaks() { let changed = false; for (let h of habits) { const ns = recalcStreakFromHistory(h); if (h.currentStreak !== ns) { h.currentStreak = ns; changed = true; } } if (changed) saveToDB(); }
    function markHabitDone(id){ let h=habits.find(h=>h.id===id); if(!h) return; let today=getTodayDate(); if(h.lastCheckDate===today){ showToast("Уже отмечено","#ff99cc"); return; } if(!h.history) h.history=[]; if(!h.history.includes(today)) h.history.push(today); h.currentStreak=recalcStreakFromHistory(h); h.lastCheckDate=today; saveToDB(); renderUI(); updateCatAndGlobalUI(true); showToast(`${h.name} +1 день! Цепочка: ${h.currentStreak}`,"#dbbaff"); }
    function animateCat() { let cat=document.getElementById("catSvgElem"); if(cat){ cat.classList.remove("cat-celebrate"); void cat.offsetWidth; cat.classList.add("cat-celebrate"); setTimeout(()=>cat.classList.remove("cat-celebrate"),1400); } }
    function updateCatAndGlobalUI(isMark){ let gs=computeGlobalStreak(); document.getElementById("globalStreakDisplay").innerText=gs; let cat=document.getElementById("catSvgElem"); if(cat){ if(gs>0){ cat.classList.remove("inactive-cat"); cat.classList.add("active-cat"); } else { cat.classList.remove("active-cat"); cat.classList.add("inactive-cat"); } } if(isMark) animateCat(); }
    function addHabit(name,type){ let t=name.trim(); if(!t){ showToast("Введите название!","#ffa0d0"); return false; } if(habits.some(h=>h.name.toLowerCase()===t.toLowerCase())){ showToast("Привычка уже есть","#ffb5b5"); return false; } habits.unshift({ id:crypto.randomUUID?.()||Date.now()+"-"+Math.random(), name:t, type, currentStreak:0, lastCheckDate:null, history:[] }); saveToDB(); renderUI(); updateCatAndGlobalUI(false); showToast(`"${t}" добавлена`,"#dbbaff"); return true; }
    function editHabit(id){ let h=habits.find(h=>h.id===id); if(!h) return; let newName=prompt("Новое название:",h.name); if(newName&&newName.trim()){ let trimmed=newName.trim(); if(habits.some(h2=>h2.id!==id && h2.name.toLowerCase()===trimmed.toLowerCase())){ showToast("Имя занято","#ffa0d0"); return; } h.name=trimmed; saveToDB(); renderUI(); showToast("Обновлено","#b3ffcc"); } }
    function confirmDeleteHabit(id){ showConfirmModal("Удаление привычки","Удалить привычку навсегда?",()=>{ habits=habits.filter(h=>h.id!==id); saveToDB(); renderUI(); updateCatAndGlobalUI(false); showToast("Удалено","#ffb3d1"); }); }
    function renderUI(){ let bad=document.getElementById('badHabits'),good=document.getElementById('goodHabits'); if(!bad) return; let today=getTodayDate(); let render=(h)=>{ let isToday=h.lastCheckDate===today; return `<div class="habit-card"><div class="habit-info"><div class="habit-name">${escapeHtml(h.name)}</div>${h.currentStreak>0?`<div class="streak-badge">${h.currentStreak} дн.</div>`:''}<div class="last-updated">${h.lastCheckDate||'—'}</div></div><div class="actions"><button class="edit-btn" data-id="${h.id}">✏️</button><button class="check-btn" data-id="${h.id}" ${isToday?'disabled':''}>${isToday?'Отмечено':'Отметить'}</button><button class="delete-btn" data-id="${h.id}">🗑️</button></div></div>`; };
        bad.innerHTML=habits.filter(h=>h.type==='bad').map(render).join('')||'<div class="empty-message">Нет вредных привычек</div>';
        good.innerHTML=habits.filter(h=>h.type==='good').map(render).join('')||'<div class="empty-message">Нет полезных привычек</div>';
        document.querySelectorAll('.check-btn:not([disabled])').forEach(btn=>btn.onclick=(e)=>{ markHabitDone(btn.dataset.id); e.stopPropagation(); });
        document.querySelectorAll('.delete-btn').forEach(btn=>btn.onclick=(e)=>{ confirmDeleteHabit(btn.dataset.id); e.stopPropagation(); });
        document.querySelectorAll('.edit-btn').forEach(btn=>btn.onclick=(e)=>{ editHabit(btn.dataset.id); e.stopPropagation(); });
        document.getElementById('totalHabits').innerText=habits.length;
        document.getElementById('maxStreak').innerText=Math.max(0,...habits.map(h=>h.currentStreak));
        document.getElementById('todayCompleted').innerText=habits.filter(h=>h.lastCheckDate===today).length;
    }
    function escapeHtml(str){ return String(str).replace(/[&<>]/g, m=>m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    function showToast(msg){ let t=document.getElementById('dynamicToast'); if(!t){ t=document.createElement('div'); t.id='dynamicToast'; t.style.cssText='position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#221c3ae6; backdrop-filter:blur(24px); padding:12px 32px; border-radius:60px; color:#ffecfd; z-index:9999; border:1px solid #ff80cc;'; document.body.appendChild(t); } t.innerText=msg; t.style.opacity='1'; if(window.tt) clearTimeout(window.tt); window.tt=setTimeout(()=>t.style.opacity='0',2000); }
    function loadData(){ let raw=localStorage.getItem(getStorageKey()); if(raw) try{ habits=JSON.parse(raw); if(!Array.isArray(habits)) habits=[]; }catch(e){ habits=[]; } habits=habits.map(h=>({...h, currentStreak: h.currentStreak??0, lastCheckDate: h.lastCheckDate??null, history: Array.isArray(h.history)?h.history:(h.lastCheckDate?[h.lastCheckDate]:[]), type: (h.type==='bad'||h.type==='good')?h.type:'good'})); for(let h of habits) h.currentStreak=recalcStreakFromHistory(h); saveToDB(); }
    const canvas=document.getElementById('cometsCanvas'), ctx=canvas.getContext('2d'); let comets=[];
    function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
    class SoftComet { constructor() { this.reset(); } reset() { this.x = Math.random() * canvas.width; this.y = Math.random() * -500 - 100; this.size = Math.random() * 1.8 + 0.8; this.speedY = Math.random() * 0.95 + 0.4; this.speedX = (Math.random() - 0.5) * 0.3; this.opacity = Math.random() * 0.45 + 0.2; this.hue = 310 + Math.random() * 40; } update() { this.y += this.speedY; this.x += this.speedX; if(this.y > canvas.height + 200) this.reset(); } draw() { const tailX = this.x - this.speedX * 50, tailY = this.y - this.speedY * 50; const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY); grad.addColorStop(0, `hsla(${this.hue}, 75%, 68%, ${this.opacity * 0.8})`); grad.addColorStop(1, `hsla(${this.hue}, 60%, 50%, 0)`); ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(tailX, tailY); ctx.strokeStyle = grad; ctx.lineWidth = this.size * 0.6; ctx.lineCap = 'round'; ctx.stroke(); ctx.beginPath(); ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI*2); ctx.fillStyle = `hsla(${this.hue}, 80%, 80%, ${this.opacity})`; ctx.fill(); } }
    function initComets() { comets = Array.from({ length: 18 }, () => new SoftComet()); setInterval(()=>{ ctx.clearRect(0,0,canvas.width,canvas.height); ctx.globalCompositeOperation = 'lighter'; comets.forEach(c=>{c.update(); c.draw();}); ctx.globalCompositeOperation = 'source-over'; },40); }
    window.addEventListener('resize',()=>{ resizeCanvas(); initComets(); }); resizeCanvas(); initComets();
    function init(){
        if(!localStorage.getItem('lunar_current_user')) window.location.href='add.html';
        updateUserInterface(); loadData(); refreshAllStreaks(); renderUI(); updateCatAndGlobalUI(false);
        document.getElementById('addHabitBtn').onclick=()=>{ let inp=document.getElementById('habitNameInput'); let type=document.querySelector('input[name="habitType"]:checked').value; if(addHabit(inp.value,type)) inp.value=''; else inp.classList.add('error-shake'),setTimeout(()=>inp.classList.remove('error-shake'),400); };
        document.getElementById('habitNameInput').addEventListener('keypress',e=>{if(e.key==='Enter') document.getElementById('addHabitBtn').click();});
        let rb=document.querySelector('input[value="bad"]'), rg=document.querySelector('input[value="good"]'), bl=document.getElementById('badOption'), gl=document.getElementById('goodOption');
        let updStyle=()=>{ if(rb.checked){ bl.classList.add('active-bad'); gl.classList.remove('active-good'); } else { gl.classList.add('active-good'); bl.classList.remove('active-bad'); } };
        rb.addEventListener('change',updStyle); rg.addEventListener('change',updStyle); updStyle();
        document.getElementById('drawerChangeDataBtn').onclick=showEditDataModal;
        document.getElementById('drawerDeleteAccountBtn').onclick=deleteAccount;
        document.getElementById('drawerLogoutBtn').onclick=logout;
        document.getElementById('avatarClickArea').onclick=showAvatarPicker;
        setInterval(()=>{ let today=getTodayDate(); if(lastCheckedDate!==today){ lastCheckedDate=today; refreshAllStreaks(); renderUI(); updateCatAndGlobalUI(false); } },60000);
    }
    let lastCheckedDate=getTodayDate();
    init();
</script>
</body>
</html>
